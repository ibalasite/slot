<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0F1E" />
  <title>Thunder Blessing — Interactive Prototype</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Open+Sans:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="assets/prototype.css" />

  <style>
    /* Prevent flash of unstyled body */
    body { background: #0A0F1E; }

    /* Flow map modal — inline style supplement */
    #flow-map-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9990;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-box {
      width: 100%;
      max-width: 720px;
      position: relative;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-header h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      color: #FFD700;
      letter-spacing: 2px;
    }
    .modal-header button {
      font-size: 20px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: color 120ms;
    }
    .modal-header button:hover { color: #fff; }
    .screen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    /* Nav link style */
    .nav-link {
      background: rgba(220,163,49,0.15);
      border: 1px solid rgba(220,163,49,0.4);
      color: #DCA331;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background 120ms;
    }
    .nav-link:hover { background: rgba(220,163,49,0.3); }
  </style>
</head>
<body>

<!-- ============================================================
     PROTO SHELL
     ============================================================ -->
<div id="proto-shell">

  <!-- Top prototype navigation bar -->
  <nav id="proto-nav" aria-label="Prototype navigation">
    <a href="../../index.html" class="nav-link" id="nav-back-btn">← Docs</a>
    <span id="proto-breadcrumb">Thunder Blessing Prototype</span>
    <div class="nav-actions" style="display:flex;gap:6px;align-items:center;">
      <a href="api-explorer/index.html" class="nav-link">🔌 API Explorer</a>
      <button class="nav-btn" id="nav-flow-btn" onclick="showFlowMap()">📍 Flow Map</button>
      <button class="nav-btn" id="audio-unlock-btn">🔊 Enable Audio</button>
    </div>
  </nav>

  <!-- Screen container — all 12 screens render here -->
  <main id="proto-content" aria-label="Game screen container">
    <!-- Screens injected by PrototypeRouter -->
  </main>

</div><!-- /#proto-shell -->

<!-- ============================================================
     FLOW MAP MODAL
     All 12 screens shown as a clickable grid
     ============================================================ -->
<div id="flow-map-modal" role="dialog" aria-label="Game Flow Map" aria-modal="true">
  <div class="modal-box">
    <div class="modal-header">
      <h2>⚡ Game Flow Map</h2>
      <button onclick="document.getElementById('flow-map-modal').style.display='none'" aria-label="Close">✕</button>
    </div>
    <div id="screen-grid" class="screen-grid">
      <!-- Populated by showFlowMap() -->
    </div>
    <div style="margin-top:12px;font-size:10px;color:rgba(245,240,232,0.3);text-align:center;">
      Click any screen to jump directly · Press M to toggle · Esc to close
    </div>
  </div>
</div>

<!-- ============================================================
     LIGHTNING OVERLAY — full-screen flash for Thunder Blessing
     ============================================================ -->
<div id="lightning-overlay"
     style="position:fixed;inset:0;background:#c8e8ff;pointer-events:none;z-index:999;opacity:0;transition:opacity 50ms"
     aria-hidden="true">
</div>

<!-- ============================================================
     FX CANVAS — particle overlay (pointer-events: none)
     ============================================================ -->
<canvas
  id="fx-canvas"
  aria-hidden="true"
  style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:8000;"
></canvas>

<!-- ============================================================
     SCRIPTS — load order matters
     1. mock-data    (GAME_CONFIG, SYMBOLS, SPIN_RESULTS, helpers)
     2. audio-engine (AudioEngine class — Web Audio synthesis)
     3. fx-engine    (FXEngine class — canvas particles + CSS helpers)
     4. prototype    (Router + 12 screen renderers + game logic)
     ============================================================ -->
<script src="assets/mock-data.js"></script>
<script src="assets/audio-engine.js"></script>
<script src="assets/fx-engine.js"></script>
<script src="assets/prototype.js"></script>

<script>
  'use strict';

  window.addEventListener('load', () => {

    // 1. FX Engine — init canvas (also starts animation loop + ambient sparkle)
    window.fxEngine.init('fx-canvas');

    // 2. Audio Engine — create instance (unlocked on user gesture)
    window.audioEngine = new AudioEngine();

    // Wire the audio unlock button
    document.getElementById('audio-unlock-btn')?.addEventListener('click', async () => {
      if (!window.audioEngine) return;
      const ok = await window.audioEngine.unlock();
      if (ok) {
        const btn = document.getElementById('audio-unlock-btn');
        if (btn) {
          btn.textContent = '🔊 Audio ON';
          btn.style.opacity = '0.6';
          btn.style.pointerEvents = 'none';
        }
        window.audioEngine.playBGM('BGM_LOBBY');
      }
    });

    // 3. Init prototype router → navigates to screen-01
    initPrototype();

    // 4. Demo button — cycle through interesting screens
    const demoScenes = [
      'screen-03', 'screen-05', 'screen-06',
      'screen-07', 'screen-08', 'screen-09',
      'screen-10', 'screen-11', 'screen-12',
    ];
    let demoIdx = 0;
    const demoBtn = document.createElement('button');
    demoBtn.className = 'nav-btn';
    demoBtn.textContent = '🎲 Demo';
    demoBtn.title = 'Cycle through screens for quick inspection';
    demoBtn.addEventListener('click', () => {
      const target = demoScenes[demoIdx % demoScenes.length];
      demoIdx++;
      if (window.router) window.router.navigate(target, { forceRender: true });
    });
    document.querySelector('.nav-actions')?.appendChild(demoBtn);

    console.log('[Init] Thunder Blessing Prototype ready.');
    console.log('[Keys] 1-9: jump to screen | M: flow map | Esc: back');
  });
</script>

</body>
</html>
